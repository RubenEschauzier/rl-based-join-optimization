model:
  type: GINEConv
  embedding:
    layers:
      - type: Linear
        in_features: 129
        out_features: 128
        id: embed_1
      - type: TripleGINEConvMoE
        num_experts: 16
        top_k: 3
        nn:
          - type: Linear
            in_features: 128
            out_features: 64
            id: gine_nn_1_lin_1
          - type: ReLU
            id: gine_nn_1_relu_1
          - type: Linear
            in_features: 64
            out_features: 128
            id: gine_nn_1_lin_2
        edge_dim: 129
        id: gine_moe_1

      - type: GraphNorm
        in_channels: 101
        id: graph_norm_1

      - type: TripleGINEConvMoE
        num_experts: 16
        top_k: 3
        nn:
          - type: Linear
            in_features: 128
            out_features: 64
            id: gine_nn_2_lin_1
          - type: ReLU
            id: gine_nn_2_relu_1
          - type: Linear
            in_features: 64
            out_features: 200
            id: gine_nn_2_lin_2
        edge_dim: 129
        id: gine_moe_2

      - type: SumAggregation
        id: sum_agg

  heads:
    - estimation_type: cardinality
      layers:
        - type: Linear
          in_features: 200
          out_features: 50
          id: card_nn_lin_1
        - type: ReLU
          id: card_nn_relu_1
        - type: Linear
          in_features: 50
          out_features: 1
          id: card_nn_lin_2

weight_location:
  directory: ""
  chkp: true